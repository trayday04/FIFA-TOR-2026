<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="assets/fwc26-logo.png" />
<title>FIFA World Cup 26&#8482; &middot; Matches</title>
<style>
@font-face {
  font-family: "FWC26";
  src: url("assets/fonts/FWC26.woff2") format("woff2"),
       url("assets/fonts/FWC26.woff") format("woff");
  font-weight: 100 900;
  font-display: swap;
}

:root {
  --bg: #0a0a0a;
  --bg-2: #121212;
  --surface: #171717;
  --surface-2: #1f1f1f;
  --line: #2a2a2a;
  --text: #f7f7f7;
  --muted: #9a9a9a;
  --faint: #6b6b6b;
  --volt: #afea00;
  --volt-dim: #8bbd00;
  --purple: #7b2ff7;
  --orange: #ff6a00;
  --pink: #ff2d8e;
  --blue: #2e7bff;
  --radius: 18px;
  --radius-sm: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --nav-h: 64px;
  --brand-bar-h: 62px;
  --seg-bar-h: 56px;
  --search-bar-h: 56px;
  --chips-bar-h: 49px;
  --glass-bg: rgba(10, 10, 10, 0.94);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-blur: blur(24px) saturate(180%);
  --sticky-search-top: 0px;
  --header-h: 120px;
}

.glass-panel {
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--glass-border);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: "Noto Sans", "Helvetica Neue", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
}
.display {
  font-family: "FWC26", "Helvetica Neue", sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.01em;
  line-height: 0.92;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; }
::-webkit-scrollbar { width: 0; height: 0; }

/* ===== App shell ===== */
#app {
  max-width: 520px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  background: var(--bg);
  display: flex;
  flex-direction: column;
}

/* ===== Top bar ===== */
.topbar {
  position: sticky;
  top: 0;
  z-index: 40;
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  transition: padding .2s ease;
}
.topbar#mainTopbar {
  background-color: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  overflow: visible;
  isolation: isolate;
}
.brandrow {
  display: flex; align-items: center; gap: 12px;
  transition: opacity .22s ease, max-height .22s ease, margin .22s ease;
  max-height: 80px;
  overflow: hidden;
}
.topbar .segwrap {
  transition: opacity .22s ease, max-height .22s ease, padding .22s ease;
  max-height: 80px;
  overflow: hidden;
}
.segwrap.hidden { display: none; }

/* Shared sticky header stack */
body.view-matches .matches-head,
body.view-cal .matches-head,
body.view-teams #teamsShell > .matches-head,
body.view-stadiums #stadiumsShell > .topbar,
body.view-events #eventsShell > .topbar {
  background-color: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  isolation: isolate;
}
body.view-matches .matches-head,
body.view-cal .matches-head,
body.view-teams #teamsShell > .matches-head,
body.view-stadiums #stadiumsShell > .topbar,
body.view-events #eventsShell > .topbar {
  border-bottom: 1px solid var(--glass-border);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
}

body.view-matches #mainTopbar,
body.view-cal #mainTopbar,
body.view-teams #mainTopbar,
body.view-stadiums #mainTopbar,
body.view-events #mainTopbar {
  background-color: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  isolation: isolate;
}

/* Search + page views as one sticky block below brand */
.matches-head {
  position: sticky;
  top: var(--sticky-search-top);
  z-index: 39;
  width: 100%;
  min-width: 0;
  overflow: hidden;
}
.matches-head > .topbar,
.matches-head > .match-segwrap {
  position: static;
  top: auto;
  z-index: auto;
  background: transparent;
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  border: none;
  box-shadow: none;
  transform: none;
}
.matches-head > .topbar { overflow: visible; }
.matches-head > .topbar {
  padding: 8px 16px 0;
  transition: none;
}
.matches-head > .topbar .search { margin-top: 0; }
.matches-head > .match-segwrap { padding: 8px 16px 10px; }

#stadiumsShell > .topbar,
#eventsShell > .topbar {
  position: sticky;
  top: var(--sticky-search-top);
  z-index: 39;
  padding: 8px 16px 8px;
  background-color: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--glass-border);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
  overflow: visible;
  transform: translateZ(0);
  isolation: isolate;
}
#stadiumsShell > .topbar .search,
#eventsShell > .topbar .ev-search { margin-top: 0; }
.crest {
  width: 38px; height: 38px; flex: none;
  border-radius: 10px;
  overflow: hidden;
  background: #000;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}
.crest img { width: 100%; height: 100%; object-fit: cover; display: block; }
.brandtext { display: flex; flex-direction: column; line-height: 1; min-width: 0; }
.brandtext .k {
  display: flex; align-items: baseline; gap: 10px;
  font-family: "FWC26", sans-serif; font-size: 20px; letter-spacing: 0.02em;
}
.brandtext .k em { color: var(--volt); font-style: normal; }
.brand-context {
  display: none;
  font-family: inherit;
  font-size: 10.5px;
  font-weight: 400;
  color: var(--muted);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  white-space: nowrap;
}
.brand-context::before {
  content: "|";
  margin: 0 10px;
  color: var(--faint);
  font-weight: 400;
  letter-spacing: 0;
}
body.view-events .brand-context { display: inline; }
.brandtext .s { font-size: 10.5px; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 3px; }

.search {
  margin-top: 14px;
  display: flex; align-items: center; gap: 10px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 11px 14px;
  transition: border-color .15s;
}
.search:focus-within { border-color: var(--volt); }
.search svg { width: 18px; height: 18px; flex: none; color: var(--faint); }
.search input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 15px;
}
.search input::placeholder { color: var(--faint); }
.search .clear { color: var(--faint); font-size: 20px; line-height: 1; display: none; padding: 2px 4px; }
.search.has-value .clear { display: block; }

/* ===== Main scroll area ===== */
#matchesMain, #stadiumsMain, #eventsMain, #teamsMain {
  flex: 1;
  padding: 6px 16px calc(var(--nav-h) + var(--safe-bottom) + 28px);
}
.view { display: none; }
.view.active { display: block; animation: fade .22s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ===== Date section header ===== */
.daysep {
  position: sticky;
  top: var(--header-h);
  z-index: 12;
  display: flex; align-items: baseline; gap: 10px;
  padding: 14px 2px 12px;
  margin: 0 -2px 6px;
  background-color: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--glass-border);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
  isolation: isolate;
}
.daysep .dnum { font-family: "FWC26", sans-serif; font-size: 26px; line-height: 1; }
.daysep .dwrap { display: flex; flex-direction: column; }
.daysep .dwk { font-size: 12px; color: var(--volt); text-transform: uppercase; letter-spacing: .12em; font-weight: 700; }
.daysep .dmo { font-size: 12px; color: var(--muted); }
.daysep .dcount { margin-left: auto; font-size: 11.5px; color: var(--faint); align-self: center; }

/* ===== Match card ===== */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  scroll-margin-top: calc(var(--header-h) + 58px);
  padding: 14px 14px 12px;
  margin-bottom: 12px;
  transition: transform .12s, border-color .15s;
}
.card:active { transform: scale(0.985); border-color: #3a3a3a; }
.card .meta {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--muted); margin-bottom: 12px;
}
.tag {
  font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 6px; font-size: 10px;
}
.tag.group { background: rgba(175,234,0,.14); color: var(--volt); }
.tag.ko { background: rgba(123,47,247,.2); color: #c4a0ff; }
.tag.final { background: var(--volt); color: #0a0a0a; }
.card .mno { margin-left: auto; color: var(--faint); }

.fixture { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 6px; }
.team { display: flex; flex-direction: column; align-items: center; gap: 7px; text-align: center; min-width: 0; }
.team .flag { font-size: 30px; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,.4)); }
.team .nm { font-size: 13px; font-weight: 600; line-height: 1.15; }
.team.tbd .nm { color: var(--faint); }
.team .code { font-family: "FWC26", sans-serif; font-size: 13px; color: var(--muted); }

.center { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 0 6px; }
.center .score { font-family: "FWC26", sans-serif; font-size: 26px; line-height: 1; letter-spacing: 0.04em; }
.center .score.live { color: var(--volt); }
.center .score.ft { color: var(--text); }
.center .status { font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--volt); margin-bottom: 2px; }
.center .status.live-pulse { animation: livePulse 1.4s ease-in-out infinite; }
.center .minute { font-size: 10px; font-weight: 700; color: var(--volt); letter-spacing: .04em; }
@keyframes livePulse { 0%, 100% { opacity: 1; } 50% { opacity: .45; } }
.center .time.scheduled { font-family: "FWC26", sans-serif; font-size: 22px; line-height: 1; }
.center .vs { font-family: "FWC26", sans-serif; font-size: 14px; color: var(--faint); }
.center .et { font-size: 9.5px; color: var(--faint); letter-spacing: .04em; }

.card .venue {
  margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--line);
  display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted);
}
.card .venue svg { width: 12px; height: 12px; color: var(--faint); flex: none; }
.card .venue .city { color: var(--text); font-weight: 600; }

.center .pen-result { font-size: 9px; font-weight: 700; color: var(--volt); letter-spacing: .04em; text-align: center; line-height: 1.2; max-width: 120px; }
.center .pen-result-lg { font-size: 10px; max-width: 160px; margin-top: 2px; }

.card .pen-result { display: block; margin-top: 4px; font-size: 9.5px; font-weight: 700; color: var(--volt); letter-spacing: .03em; text-align: center; grid-column: 1 / -1; }

.sh-pens { margin: 0 0 18px; }
.sh-pens-h { font-size: 11px; color: var(--faint); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; text-align: center; }
.sh-pens-score { font-family: "FWC26", sans-serif; font-size: 22px; text-align: center; margin-bottom: 10px; }
.sh-pens-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.sh-pens-col { background: var(--surface); border-radius: 12px; padding: 10px 12px; border: 1px solid var(--line); }
.sh-pens-col.pen-winner { border-color: rgba(175,234,0,.35); box-shadow: inset 0 0 0 1px rgba(175,234,0,.12); }
.sh-pens-col h4 { font-size: 11px; color: var(--muted); margin: 0 0 4px; font-weight: 700; }
.sh-pens-meta { font-size: 10px; color: var(--faint); margin-bottom: 8px; }
.sh-pens-col ul { list-style: none; margin: 0; padding: 0; }
.sh-pens-col li { font-size: 13px; padding: 4px 0; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; }
.sh-pens-col li:last-child { border-bottom: none; }
.sh-pens-col .pen-ico { width: 14px; flex: none; font-weight: 800; text-align: center; }
.sh-pens-col .pen-hit .pen-ico { color: var(--volt); }
.sh-pens-col .pen-miss .pen-ico { color: #ff6b6b; }

.card .goals {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--line);
}
.card .goals .gcol { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.card .goals .gcol:last-child { text-align: right; align-items: flex-end; }
.card .goal-line { font-size: 11px; line-height: 1.25; color: var(--muted); }
.card .goal-line .gm { font-weight: 700; color: var(--volt); margin-right: 4px; font-variant-numeric: tabular-nums; }
.card .goal-line .goal-og { color: var(--faint); font-weight: 600; }
.card .goal-none { font-size: 11px; color: var(--faint); }

.sh-goals { margin: 0 0 18px; }
.sh-goals-h { font-size: 11px; color: var(--faint); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; text-align: center; }
.sh-goals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.sh-goals-col { background: var(--surface); border-radius: 12px; padding: 10px 12px; border: 1px solid var(--line); }
.sh-goals-col h4 { font-size: 11px; color: var(--muted); margin: 0 0 8px; font-weight: 700; }
.sh-goals-col ul { list-style: none; margin: 0; padding: 0; }
.sh-goals-col li { font-size: 13px; padding: 4px 0; border-bottom: 1px solid var(--line); }
.sh-goals-col li:last-child { border-bottom: none; }
.sh-goals-col li .gm { font-weight: 700; color: var(--volt); margin-right: 6px; }
.sh-goals-col li .goal-og { color: var(--faint); font-weight: 600; }

/* ===== empty state ===== */
.empty { text-align: center; padding: 60px 20px; color: var(--faint); }
.empty .big { font-family: "FWC26", sans-serif; font-size: 20px; letter-spacing: 0.02em; color: var(--muted); margin-bottom: 8px; }

/* ===== Calendar ===== */
.calhead {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px;
  margin: 0 -16px 8px;
  position: sticky;
  top: var(--header-h);
  z-index: 12;
  background-color: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--glass-border);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
  isolation: isolate;
}
.calhead .mlabel { font-family: "FWC26", sans-serif; font-size: 28px; }
.calhead .mlabel em { color: var(--volt); font-style: normal; }
.calnav { display: flex; gap: 8px; }
.calnav button {
  width: 38px; height: 38px; border-radius: 11px; background: var(--surface);
  border: 1px solid var(--line); display: grid; place-items: center; color: var(--text);
}
.calnav button:disabled { opacity: .3; }
.calnav svg { width: 16px; height: 16px; }
.dow { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin: 6px 0; }
.dow span { text-align: center; font-size: 10px; color: var(--faint); text-transform: uppercase; letter-spacing: .08em; }
.grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
.cell {
  aspect-ratio: 1; border-radius: 12px; background: var(--surface);
  border: 1px solid transparent;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  position: relative; transition: all .12s;
}
.cell.empty-cell { background: transparent; }
.cell.has { background: var(--surface-2); border-color: var(--line); }
.cell.has:active { transform: scale(.94); }
.cell.sel { background: var(--volt); border-color: var(--volt); }
.cell .d { font-size: 14px; font-weight: 600; }
.cell.sel .d { color: #0a0a0a; }
.cell .dots { display: flex; gap: 3px; }
.cell .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--volt); }
.cell.sel .dot { background: #0a0a0a; }
.cell .n { font-size: 9px; color: var(--volt); font-weight: 700; }
.cell.sel .n { color: #0a0a0a; }
.cell.today .d { color: var(--volt); }
.cell.sel.today .d { color: #0a0a0a; }

.dayhdr { display: flex; align-items: baseline; gap: 8px; padding: 22px 2px 12px; }
.dayhdr .t { font-family: "FWC26", sans-serif; font-size: 22px; }
.dayhdr .c { font-size: 12px; color: var(--volt); font-weight: 700; }

/* ===== Teams grid ===== */
.tgrid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; padding-top: 8px; }
.tcard {
  background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
  padding: 14px; display: flex; align-items: center; gap: 12px; transition: all .12s; text-align: left;
}
.tcard:active { transform: scale(.97); border-color: #3a3a3a; }
.tcard .flag { font-size: 30px; flex: none; }
.tcard .info { min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.tcard .nm { font-size: 14px; font-weight: 600; line-height: 1.1; }
.tcard .grp { font-size: 11px; color: var(--muted); margin-top: 3px; }
.tcard .grp b { color: var(--volt); }
.section-label { font-family: "FWC26", sans-serif; font-size: 16px; color: var(--muted); padding: 18px 2px 6px; }
#stadiumsMain .section-label { color: var(--volt); }

/* ===== Bottom nav ===== */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  max-width: 520px; margin: 0 auto;
  height: calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(16,16,16,0.92);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--line);
  display: grid; grid-template-columns: repeat(4,1fr);
}
.nav button {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  color: var(--faint); font-size: 10.5px; font-weight: 600; letter-spacing: .02em;
}
.nav button svg { width: 22px; height: 22px; }
.nav button.active { color: var(--volt); }

/* ===== Modal ===== */
.scrim {
  position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,.66);
  backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity .2s;
  display: flex; align-items: flex-end; justify-content: center;
}
.scrim.open { opacity: 1; pointer-events: auto; }
.sheet {
  position: relative;
  width: 100%; max-width: 520px; background: var(--bg-2);
  border-radius: 24px 24px 0 0; border: 1px solid var(--line); border-bottom: none;
  transform: translateY(100%); transition: transform .26s cubic-bezier(.2,.8,.2,1);
  max-height: 88vh; overflow: hidden;
  display: flex; flex-direction: column;
}
.sheet-scroll {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 10px 18px calc(var(--safe-bottom) + 26px);
  flex: 1; min-height: 0;
}
.scrim.open .sheet { transform: none; }
.grab { width: 40px; height: 4px; border-radius: 99px; background: #3a3a3a; margin: 8px auto 16px; }
.sheet-close {
  position: absolute; top: 14px; right: 14px; z-index: 10;
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(0,0,0,.58); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.14); color: var(--text);
  display: grid; place-items: center; cursor: pointer;
}
.sheet-close svg { width: 16px; height: 16px; }
.sheet-close:active { opacity: .65; transform: scale(.94); }
.sheet .sh-stage { display: flex; justify-content: center; margin-bottom: 14px; }
.sheet .sh-fix { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; margin: 4px 0 20px; }
.sheet .sh-team { text-align: center; }
.sheet .sh-team .flag { font-size: 52px; }
.sheet .sh-team .nm { font-family: "FWC26", sans-serif; font-size: 19px; margin-top: 8px; }
.sheet .sh-team .code { font-size: 11px; color: var(--muted); }
.sheet .sh-center {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 5px; min-width: 76px; padding: 0 8px; text-align: center;
}
.sheet .sh-center .status {
  font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  color: var(--faint); line-height: 1;
}
.sheet .sh-center .status.live-pulse { color: var(--volt); animation: livePulse 1.4s ease-in-out infinite; }
.sheet .sh-center .score {
  font-family: "FWC26", sans-serif; font-size: 38px; line-height: 0.92;
  letter-spacing: 0.04em; color: var(--text);
}
.sheet .sh-center .score.live { color: var(--volt); }
.sheet .sh-center .minute { font-size: 10px; font-weight: 700; color: var(--volt); letter-spacing: .04em; }
.sheet .sh-center .time { font-family: "FWC26", sans-serif; font-size: 30px; text-align: center; line-height: 1; }
.sheet .sh-center .vs { font-family: "FWC26", sans-serif; font-size: 16px; color: var(--faint); text-align: center; }
.sheet .sh-center .et { font-size: 10px; color: var(--faint); text-align: center; }
.sh-info { background: var(--surface); border-radius: 14px; overflow: hidden; }
.sh-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line); }
.sh-row:last-child { border-bottom: none; }
.sh-row svg { width: 18px; height: 18px; color: var(--volt); flex: none; }
.sh-row .l { font-size: 11px; color: var(--faint); text-transform: uppercase; letter-spacing: .06em; }
.sh-row .v { font-size: 14px; font-weight: 600; margin-top: 2px; }
.sh-title { font-family: "FWC26", sans-serif; font-size: 22px; text-align: center; margin: 6px 0 16px; }
.ev-detail-hdr { text-align: center; margin-bottom: 14px; }
.ev-detail-hdr .tag { display: inline-block; margin-bottom: 10px; }
.ev-detail-hdr .time { font-family: "FWC26", sans-serif; font-size: 28px; line-height: 1; }
.ev-detail-hdr .date { font-size: 12px; color: var(--muted); margin-top: 6px; }
.ev-desc { font-size: 14px; line-height: 1.55; color: var(--muted); padding: 0 4px 16px; }
.ev-fix { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; margin: 0 0 16px; }
.ev-fix .team { text-align: center; }
.ev-fix .flag { font-size: 36px; }
.ev-fix .nm { font-size: 12px; font-weight: 600; margin-top: 6px; line-height: 1.15; }
.ev-fix .vs { font-family: "FWC26", sans-serif; font-size: 14px; color: var(--faint); }
.sh-link { color: var(--volt); text-decoration: underline; text-underline-offset: 3px; }
.sh-hero { margin: -10px -18px 16px; position: relative; overflow: hidden; border-radius: 16px 16px 0 0; }
.sh-hero img { width: 100%; height: 168px; object-fit: cover; display: block; background: var(--surface); }
.sh-hero-cap { position: absolute; left: 0; right: 0; bottom: 0; padding: 28px 14px 10px; font-size: 12px; font-weight: 700; background: linear-gradient(transparent, rgba(0,0,0,.82)); }
.sh-hint { text-align: center; font-size: 11px; color: var(--faint); margin: -10px 0 14px; }
.sh-section { font-family: "FWC26", sans-serif; font-size: 14px; color: var(--volt); margin: 18px 0 8px; letter-spacing: .04em; text-transform: uppercase; }
.sh-team-btn { background: none; border: none; color: inherit; padding: 0; cursor: pointer; width: 100%; border-radius: 12px; transition: background .15s; }
.sh-team-btn:active { background: rgba(175,234,0,.08); }
.roster { display: flex; flex-direction: column; gap: 2px; margin-bottom: 4px; }
.roster-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line); }
.roster-row:last-child { border-bottom: none; }
.roster-photo { width: 52px; height: 52px; border-radius: 50%; overflow: hidden; flex: none; background: var(--surface); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; }
.roster-photo img {
  width: 100%; height: 100%; object-fit: cover;
  object-position: center 8%;
  transform: scale(1.35);
  transform-origin: center 14%;
}
.roster-photo.ph { background: #1a1a1a; }
.roster-photo .ph-init { font-family: "FWC26", sans-serif; font-size: 18px; color: var(--faint); }
.roster-name { font-size: 14px; font-weight: 700; line-height: 1.2; }
.roster-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
.roster-no { color: var(--volt); font-weight: 700; margin-right: 4px; }
.roster-club { font-size: 11px; color: var(--faint); margin-top: 2px; line-height: 1.25; }

/* team sheet fixture rows */
.tf-row { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--line); }
.tf-row:last-child { border-bottom: none; }
.tf-date { width: 52px; flex: none; text-align: center; }
.tf-date .dn { font-family: "FWC26", sans-serif; font-size: 20px; line-height: 1; }
.tf-date .mo { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.tf-opp { flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0; }
.tf-opp .flag { font-size: 22px; }
.tf-opp .x { font-size: 11px; color: var(--faint); }
.tf-opp .nm { font-size: 14px; font-weight: 600; }
.tf-meta { text-align: right; flex: none; }
.tf-meta .tm { font-family: "FWC26", sans-serif; font-size: 15px; }
.tf-meta .ct { font-size: 10px; color: var(--muted); }

/* ===== iOS-style top segment ===== */
.segwrap { padding: 14px 0 0; }
.seg {
  display: flex; position: relative;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 12px; padding: 3px;
}
.seg-ind {
  position: absolute; top: 3px; bottom: 3px; left: 3px; width: calc(50% - 3px);
  background: var(--volt); border-radius: 9px;
  transition: transform .24s cubic-bezier(.2,.8,.2,1);
}
.seg[data-tab="cal"] .seg-ind { transform: translateX(100%); }
.seg button {
  flex: 1; position: relative; z-index: 1;
  font-size: 13px; font-weight: 700; padding: 9px 8px; border-radius: 9px;
  color: var(--muted); transition: color .15s;
  touch-action: manipulation; -webkit-user-select: none; user-select: none;
}
.seg button.active { color: #0a0a0a; }

.nav button { font-size: 10px; }

/* ===== Stadiums ===== */
#matchesShell, #stadiumsShell, #eventsShell, #teamsShell { display:flex; flex-direction:column; flex:1; min-height:0; }
#stadiumsShell.hidden, #eventsShell.hidden, #matchesShell.hidden, #teamsShell.hidden { display:none !important; }
.stadium-card {
  display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 12px; margin-bottom: 10px; transition: transform .12s, border-color .15s;
}
.stadium-card:active { transform: scale(.985); border-color: #3a3a3a; }
.stadium-card .thumb {
  width: 72px; height: 52px; border-radius: 10px; flex: none; overflow: hidden;
  background: var(--surface-2); box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
}
.stadium-card .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.stadium-card .info { flex: 1; min-width: 0; }
.stadium-card .name { font-size: 14px; font-weight: 700; line-height: 1.15; }
.stadium-card .loc { font-size: 11px; color: var(--muted); margin-top: 3px; }
.stadium-card .meta { font-size: 10px; color: var(--faint); margin-top: 5px; }
.stadium-card .chev { color: var(--faint); font-size: 18px; flex: none; }
.sh-matches { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
.sh-matches .card { margin-bottom: 0; }

/* ===== Toronto events ===== */
.ev-day { margin-bottom: 22px; }
.ev-dayhdr {
  display: flex; align-items: baseline; gap: 10px;
  padding: 14px 18px 12px;
  margin: 0 -16px 6px;
  position: sticky; top: var(--header-h); z-index: 12;
  background-color: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--glass-border);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
  isolation: isolate;
}
.ev-dayhdr .dnum { font-family: "FWC26", sans-serif; font-size: 28px; line-height: 1; }
.ev-dayhdr .dwrap { display: flex; flex-direction: column; }
.ev-dayhdr .dwk { font-size: 12px; color: var(--volt); text-transform: uppercase; letter-spacing: .12em; font-weight: 700; }
.ev-dayhdr .dmo { font-size: 12px; color: var(--muted); }
.ev-venue {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 14px 14px 10px; margin-bottom: 10px;
  display: flex; flex-direction: column;
}
.ev-venue .vhead { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
.ev-venue .vicon {
  width: 36px; height: 36px; border-radius: 10px; flex: none;
  overflow: hidden; background: var(--surface-2);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
}
.ev-venue .vicon img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ev-venue .vname { font-size: 14px; font-weight: 700; line-height: 1.15; }
.ev-venue .vplace { font-size: 11px; color: var(--muted); margin-top: 2px; }
.ev-venue .vhours { margin-left: auto; text-align: right; font-size: 10px; color: var(--faint); white-space: nowrap; }
.ev-venue .vtag {
  display: inline-block; margin-top: 8px; font-size: 10px; font-weight: 700;
  padding: 3px 8px; border-radius: 6px; background: rgba(175,234,0,.12); color: var(--volt);
  text-transform: uppercase; letter-spacing: .05em;
}
.ev-row {
  display: grid; grid-template-columns: 64px 1fr auto; gap: 10px; align-items: start;
  padding: 10px 0; border-top: 1px solid var(--line);
  width: 100%; text-align: left; transition: opacity .12s;
}
.ev-row:active { opacity: 0.7; }
.ev-row .chev { color: var(--faint); font-size: 18px; line-height: 1; padding-top: 2px; }
.ev-row .et { font-family: "FWC26", sans-serif; font-size: 13px; color: var(--muted); line-height: 1.1; }
.ev-row .etitle { font-size: 13px; font-weight: 600; line-height: 1.25; }
.ev-row .ecat {
  display: inline-block; margin-top: 4px; font-size: 9px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase; padding: 2px 6px; border-radius: 4px;
}
.ev-row .ecat.match { background: rgba(175,234,0,.14); color: var(--volt); }
.ev-row .ecat.entertainment { background: rgba(123,47,247,.18); color: #c4a0ff; }
.ev-row .ecat.culture { background: rgba(255,106,0,.15); color: #ffb380; }
.ev-row .ecat.experience { background: rgba(46,123,255,.15); color: #8eb8ff; }
.ev-foot {
  display: flex; justify-content: flex-end; align-items: center;
  margin-top: 4px; padding-top: 8px;
}
.ev-map {
  font-size: 11.5px; font-weight: 600; color: var(--volt);
  text-decoration: underline; text-underline-offset: 3px;
  padding: 4px 2px; background: none; border: none;
}
.ev-map:active { opacity: 0.65; }
.ev-source { text-align: center; font-size: 10px; color: var(--faint); padding: 8px 0 calc(var(--nav-h) + var(--safe-bottom) + 12px); }
</style>
</head>
<body>
<div id="app">
  <header class="topbar" id="mainTopbar">
    <div class="brandrow">
      <div class="crest"><img src="assets/fwc26-logo.png" alt="FIFA World Cup 26" width="38" height="38" /></div>
      <div class="brandtext">
        <div class="k">
          <span>WORLD CUP <em>26</em></span>
          <span class="brand-context">Toronto <em>Events</em></span>
        </div>
        <div class="s">Canada &middot; Mexico &middot; USA</div>
      </div>
    </div>
  </header>

  <div id="matchesShell">
    <div class="matches-head" id="matchesHead">
      <div class="topbar">

      <input id="searchInput" type="search" placeholder="Search teams, groups, cities, stages&hellip;" autocomplete="off" />
      <button class="clear" id="searchClear" aria-label="Clear">&times;</button>
    </label>
      </div>
      <div class="segwrap match-segwrap" id="matchSegWrap">
        <div class="seg" id="matchSeg" data-tab="list">
          <div class="seg-ind"></div>
          <button type="button" data-match-view="list" class="active">Matches</button>
          <button type="button" data-match-view="cal">Calendar</button>
        </div>
      </div>
    </div>

  <main id="matchesMain">
    <section class="view active" id="view-list"></section>
    <section class="view" id="view-cal"></section>
  </main>
  </div>

  <div id="teamsShell" class="hidden">
    <div class="matches-head">
      <div class="topbar">
        <label class="search" id="teamSearchBox">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="teamSearchInput" type="search" placeholder="Search teams or groups&hellip;" autocomplete="off" />
          <button class="clear" id="teamSearchClear" aria-label="Clear">&times;</button>
        </label>
      </div>
    </div>
    <main id="teamsMain"></main>
  </div>

  <div id="stadiumsShell" class="hidden">
    <div class="topbar">
      <label class="search" id="stadiumSearchBox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="stadiumSearchInput" type="search" placeholder="Search stadiums or cities&hellip;" autocomplete="off" />
        <button class="clear" id="stadiumSearchClear" aria-label="Clear">&times;</button>
      </label>
    </div>
    <main id="stadiumsMain"></main>
  </div>

  <div id="eventsShell" class="hidden">
    <div class="topbar">
      <label class="search ev-search" id="evSearchBox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="evSearchInput" type="search" placeholder="Search venues, events, neighbourhoods&hellip;" autocomplete="off" />
        <button class="clear" id="evSearchClear" aria-label="Clear">&times;</button>
      </label>
    </div>
    <main id="eventsMain"></main>
    <div class="ev-source">Sources: torontofwc26.ca &middot; toronto.ca &middot; stacktmarket.com &middot; harbourfrontcentre.com</div>
  </div>

  <nav class="nav" id="bottomNav">
    <button data-view="matches" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.4" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.4" fill="currentColor" stroke="none"/></svg>
      Matches
    </button>
    <button data-view="events">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7-6.3-4.6L5.7 21l2.3-7-6-4.6h7.6L12 2Z"/></svg>

      Teams

</div>

<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>

<script src="schedule.js"></script>
<script src="toronto-events.js"></script>
